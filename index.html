<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AU Hill's ROI Promo Calculator</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bd:#1a3a6e;--bm:#1e5ba8;--bl:#4a90d9;--bp:#ddeeff;--bbg:#e8f3fc;--bbg2:#f0f7ff;
  --sur:#fff;--bdr:rgba(26,58,110,.12);--bdr2:rgba(26,58,110,.22);
  --tx:#111827;--tx2:#374151;--tx3:#6b7280;
  --gr:#0d6b4f;--re:#991b1b;--am:#92400e;
  --r:12px;--rs:7px;
  --fn:'Segoe UI',system-ui,sans-serif;--mo:'Consolas','Fira Mono',monospace;
}
body{font-family:var(--fn);background:var(--bbg);color:var(--tx);min-height:100vh;}
.hero{background:linear-gradient(110deg,#1a3a6e 0%,#1e5ba8 50%,#4a90d9 100%);
  position:relative;overflow:hidden;min-height:165px;display:flex;align-items:center;padding:0 2.5rem;}
.hero-dog{position:absolute;right:0;top:0;bottom:0;width:255px;display:flex;align-items:center;justify-content:flex-end;}
.hc{position:relative;z-index:2;flex:1;}
.hlogo{margin-bottom:10px;}
.hlogo img{height:68px;width:auto;object-fit:contain;filter:drop-shadow(0 2px 6px rgba(0,0,0,.3));}
.ht{font-size:clamp(20px,2.8vw,30px);font-weight:800;color:#fff;line-height:1.15;margin-bottom:5px;}
.hs{font-size:13px;color:rgba(255,255,255,.72);margin-bottom:16px;}
.hbtn{display:inline-flex;align-items:center;gap:7px;padding:9px 20px;background:#fff;color:var(--bd);
  border:none;border-radius:6px;font-size:13px;font-weight:700;font-family:var(--fn);cursor:pointer;
  box-shadow:0 2px 8px rgba(0,0,0,.2);transition:transform .15s;}
.hbtn:hover{transform:translateY(-1px);}
.wrap{max-width:1320px;margin:0 auto;padding:1.25rem;}
/* FILTER BAR */
.filter-bar{background:var(--sur);border:1px solid var(--bdr);border-radius:var(--r);
  padding:1rem 1.25rem;margin-bottom:1rem;box-shadow:0 1px 4px rgba(26,58,110,.08);}
.filter-title{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
  color:var(--bm);margin-bottom:.75rem;}
.filter-row{display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:14px;align-items:end;}
.filter-group{display:flex;flex-direction:column;gap:4px;}
.filter-lbl{font-size:11px;font-weight:600;color:var(--tx2);}
.filter-note{font-size:9px;color:var(--tx3);margin-top:1px;}
.filter-select{padding:0;border-radius:var(--rs);border:1px solid var(--bdr2);
  font-size:12px;font-family:var(--fn);background:var(--sur);color:var(--tx);}
.filter-select[multiple]{height:auto;}
.filter-select option{padding:5px 9px;}
.filter-select option:checked{background:var(--bm);color:#fff;}
.filter-actions{display:flex;flex-direction:column;gap:6px;}
.btn-clear{padding:7px 14px;border-radius:var(--rs);border:1px solid var(--bdr2);
  background:transparent;color:var(--tx2);font-size:12px;font-weight:500;font-family:var(--fn);cursor:pointer;}
.btn-clear:hover{background:var(--bbg);}
.filter-count{font-size:11px;color:var(--tx3);}
/* LAYOUT */
.app-grid{display:grid;grid-template-columns:252px 1fr;gap:1rem;align-items:start;}
.sb{background:var(--sur);border:1px solid var(--bdr);border-radius:var(--r);padding:1rem;
  box-shadow:0 1px 4px rgba(26,58,110,.08);position:sticky;top:1rem;}
.sb-sec{margin-bottom:1.1rem;}
.sb-lbl{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  color:var(--bm);margin-bottom:7px;padding-bottom:4px;border-bottom:1.5px solid var(--bp);}
.ctrl{margin-bottom:9px;}
.ctrl-hdr{display:flex;justify-content:space-between;margin-bottom:3px;}
.ctrl-lbl{font-size:11px;color:var(--tx2);}
.ctrl-val{font-size:11px;font-weight:700;font-family:var(--mo);color:var(--bd);}
input[type=range]{width:100%;accent-color:var(--bm);cursor:pointer;height:3px;
  appearance:none;background:var(--bp);border-radius:2px;outline:none;}
input[type=range]::-webkit-slider-thumb{appearance:none;width:13px;height:13px;border-radius:50%;background:var(--bm);cursor:pointer;}
select.sb-sel,input[type=number]{width:100%;padding:6px 8px;border-radius:var(--rs);
  border:1px solid var(--bdr2);font-size:12px;font-family:var(--fn);background:var(--sur);color:var(--tx);}
.xbtn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:var(--rs);
  border:1.5px solid var(--bm);background:var(--bbg2);color:var(--bd);
  font-size:12px;font-weight:700;font-family:var(--fn);cursor:pointer;width:100%;justify-content:center;margin-top:.4rem;}
.xbtn:hover{background:var(--bp);}
.main{display:flex;flex-direction:column;gap:1rem;}
/* SKU PANEL */
.sku-panel{background:var(--sur);border:1px solid var(--bdr);border-radius:var(--r);
  padding:1rem 1.25rem;box-shadow:0 1px 4px rgba(26,58,110,.08);}
.sku-panel-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem;flex-wrap:wrap;gap:8px;}
.sku-panel-title{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--bm);}
.sku-sel-info{display:flex;align-items:center;gap:8px;}
.sel-count{font-size:11px;font-weight:600;color:#fff;background:var(--bm);padding:2px 8px;border-radius:12px;}
.btn-sa{font-size:11px;color:var(--bm);background:none;border:none;cursor:pointer;text-decoration:underline;padding:0;font-family:var(--fn);}
.btn-cs{font-size:11px;color:var(--re);background:none;border:none;cursor:pointer;text-decoration:underline;padding:0;font-family:var(--fn);}
.sku-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:6px;}
.sku-card{padding:8px 10px;border-radius:var(--rs);border:1.5px solid var(--bdr2);
  cursor:pointer;background:var(--sur);transition:all .13s;text-align:left;font-family:var(--fn);position:relative;user-select:none;}
.sku-card:hover{border-color:var(--bm);box-shadow:0 2px 6px rgba(26,58,110,.1);}
.sku-card.sel{border-color:var(--bm);background:#e8f3fc;}
.sku-card.sel::after{content:'✓';position:absolute;top:5px;right:7px;font-size:11px;font-weight:700;color:var(--bm);}
.sk-id{display:block;font-size:12px;font-weight:700;color:var(--bd);font-family:var(--mo);}
.sk-ds{display:block;font-size:10px;color:var(--tx3);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sk-tags{display:flex;flex-wrap:wrap;gap:3px;margin-top:5px;}
.tag{font-size:8px;padding:1px 5px;border-radius:3px;font-weight:600;}
.tag-rx{background:#ddeeff;color:#1a3a6e;}
.tag-cat{background:#d1fae5;color:#065f46;}
.tag-ppg{background:#fef3c7;color:#92400e;}
/* RESULTS */
.results-panel{background:var(--sur);border:1px solid var(--bdr);border-radius:var(--r);
  padding:1rem 1.25rem;box-shadow:0 1px 4px rgba(26,58,110,.08);}
.rtabs{display:flex;gap:4px;margin-bottom:1rem;border-bottom:1px solid var(--bdr);padding-bottom:0;}
.rtab{padding:7px 14px;font-size:12px;font-weight:600;color:var(--tx3);border:none;background:none;
  cursor:pointer;font-family:var(--fn);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;}
.rtab.on{color:var(--bm);border-bottom-color:var(--bm);}
.met-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(118px,1fr));gap:8px;margin-bottom:1rem;}
.met{background:var(--bbg2);border-radius:8px;padding:10px 12px;}
.met-l{font-size:10px;color:var(--tx3);margin-bottom:3px;font-weight:500;}
.met-v{font-size:16px;font-weight:700;font-family:var(--mo);}
.mg{color:var(--gr);}.mr{color:var(--re);}.mb{color:var(--bm);}.ma{color:var(--am);}
.pl-card{background:var(--sur);border:1px solid var(--bdr);border-radius:var(--r);overflow:hidden;margin-bottom:1rem;}
.pl-sh{background:linear-gradient(90deg,var(--bd),var(--bm));padding:6px 1rem;font-size:10px;font-weight:700;color:#fff;letter-spacing:.04em;}
.pl-row{display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--bdr);}
.pl-row:last-child{border-bottom:none;}
.pl-row.tot{background:#eff6ff;}
.pl-row.grd{background:linear-gradient(90deg,#dbeafe,#eff6ff);}
.pl-lh{font-size:11px;color:var(--tx2);padding:6px 1rem;flex:1;}
.pl-lh small{display:block;font-size:9px;color:var(--tx3);margin-top:1px;font-family:var(--mo);}
.pl-vh{font-size:11px;font-weight:600;font-family:var(--mo);text-align:right;padding:6px .75rem;min-width:82px;white-space:nowrap;}
.neg{color:var(--re);}.pos{color:var(--gr);}.bl{color:var(--bm);}.muted{font-weight:400;color:var(--tx3);}
.compare-wrap{overflow-x:auto;}
table.cmp{border-collapse:collapse;width:100%;font-size:11px;}
table.cmp th{background:var(--bd);color:#fff;padding:6px 10px;text-align:right;white-space:nowrap;font-weight:600;}
table.cmp th:first-child{text-align:left;min-width:185px;position:sticky;left:0;background:var(--bd);}
table.cmp td{padding:5px 10px;text-align:right;border-bottom:1px solid var(--bdr);font-family:var(--mo);}
table.cmp td:first-child{text-align:left;font-family:var(--fn);color:var(--tx2);position:sticky;left:0;background:var(--sur);}
table.cmp tr:nth-child(even) td{background:var(--bbg2);}
table.cmp tr:nth-child(even) td:first-child{background:var(--bbg2);}
table.cmp tr.sec td{background:linear-gradient(90deg,var(--bd),var(--bm));color:#fff;font-weight:700;font-family:var(--fn);text-align:left;padding:4px 10px;font-size:10px;letter-spacing:.04em;}
table.cmp tr.tot td{background:#eff6ff;font-weight:700;}
table.cmp tr.grd td{background:linear-gradient(90deg,#dbeafe,#eff6ff);font-weight:700;}
.bar-card{background:var(--sur);border:1px solid var(--bdr);border-radius:var(--r);padding:1.25rem;box-shadow:0 1px 4px rgba(26,58,110,.08);}
.chart-legend{display:flex;gap:16px;margin-bottom:1rem;padding-bottom:.75rem;border-bottom:1px solid var(--bdr);flex-wrap:wrap;}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--tx2);}
.legend-dot{width:12px;height:12px;border-radius:2px;flex-shrink:0;}
.chart-row{display:grid;grid-template-columns:100px 1fr 145px;gap:12px;align-items:center;padding:10px 0;border-bottom:1px solid var(--bdr);}
.chart-row:last-child{border-bottom:none;}
.chart-sku-lbl{font-size:11px;font-weight:700;color:var(--bd);font-family:var(--mo);text-align:right;}
.chart-sku-sub{font-size:9px;color:var(--tx3);font-weight:400;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-align:right;direction:rtl;}
.stacked-bar{height:30px;display:flex;border-radius:5px;overflow:hidden;background:var(--bbg);}
.bar-seg{height:100%;transition:width .45s ease;display:flex;align-items:center;justify-content:center;overflow:hidden;white-space:nowrap;min-width:0;}
.bar-seg-lbl{font-size:10px;font-weight:700;color:#fff;padding:0 6px;text-shadow:0 1px 2px rgba(0,0,0,.3);}
.chart-vals{display:flex;flex-direction:column;gap:4px;}
.val-chip{font-size:10px;font-weight:700;font-family:var(--mo);padding:2px 8px;border-radius:4px;display:inline-block;}
.chip-cost{background:#fee2e2;color:#991b1b;}
.chip-roi-pos{background:#d1fae5;color:#065f46;}
.chip-roi-neg{background:#ffedd5;color:#92400e;}
.chip-na{background:var(--bbg2);color:var(--tx3);}
.chart-footer{display:flex;justify-content:space-between;padding-top:8px;margin-top:4px;border-top:1px solid var(--bdr);}
.axis-lbl{font-size:9px;color:var(--tx3);}
.no-sel{text-align:center;padding:2rem;color:var(--tx3);font-size:13px;}
/* BREAKDOWN TABLE */
.breakdown-wrap{overflow-x:auto;margin-top:.25rem;border:1px solid var(--bdr);border-radius:var(--r);}
table.breakdown-tbl{border-collapse:collapse;width:100%;min-width:500px;font-size:11px;}
table.breakdown-tbl thead tr{position:sticky;top:0;z-index:10;}
.tbl-col-lbl{background:var(--bd);color:#fff;padding:8px 12px;text-align:left;font-weight:700;min-width:220px;position:sticky;left:0;z-index:11;}
.tbl-col-sku{background:var(--bd);color:#fff;padding:6px 10px;text-align:right;font-weight:700;min-width:100px;white-space:nowrap;}
.tbl-col-desc{font-size:9px;font-weight:400;opacity:.75;white-space:normal;margin-top:2px;}
table.breakdown-tbl tbody tr:nth-child(even) td{background:var(--bbg2);}
table.breakdown-tbl tbody tr:nth-child(even) .tbl-row-lbl{background:var(--bbg2);}
.tbl-row-lbl{padding:5px 12px;font-size:11px;color:var(--tx2);border-bottom:.5px solid var(--bdr);position:sticky;left:0;background:var(--sur);min-width:220px;z-index:2;}
.tbl-row-lbl.bold{font-weight:700;color:var(--tx);}
table.breakdown-tbl tbody td{padding:5px 10px;text-align:right;border-bottom:.5px solid var(--bdr);font-family:var(--mo);font-size:11px;color:var(--tx);}
tr.tbl-section td{background:linear-gradient(90deg,var(--bd),var(--bm));color:#fff;font-weight:700;font-family:var(--fn);text-align:left;padding:5px 12px;font-size:10px;letter-spacing:.05em;text-transform:uppercase;position:sticky;left:0;}
.tpos{color:var(--gr);font-weight:600;}
.tneg{color:var(--re);font-weight:600;}
.tamb{color:var(--am);font-weight:600;}
.tneutral{color:var(--tx3);}
/* UPLOAD */
.upload-drop{display:flex;align-items:center;justify-content:center;gap:6px;padding:8px 10px;
  border-radius:var(--rs);border:1.5px dashed var(--bdr2);background:var(--bbg2);
  color:var(--bm);font-size:11px;font-weight:600;font-family:var(--fn);cursor:pointer;
  transition:all .15s;width:100%;margin-top:6px;text-align:center;}
.upload-drop:hover{border-color:var(--bm);background:var(--bp);}
#postPromoDrop:hover{border-color:#c2410c !important;background:#fff7ed !important;}
.upload-status{display:flex;align-items:center;gap:8px;padding:7px 9px;border-radius:var(--rs);
  font-size:11px;font-weight:500;margin-bottom:0;}
.upload-status.default{background:var(--bbg2);color:var(--tx2);border:0.5px solid var(--bdr);}
.upload-status.success{background:#d1fae5;color:#065f46;border:0.5px solid #6ee7b7;}
.upload-status.error{background:#fee2e2;color:#991b1b;border:0.5px solid #fca5a5;}
.upload-status.loading{background:#eff6ff;color:var(--bm);border:0.5px solid var(--bp);}
.upload-icon{font-size:16px;flex-shrink:0;}
.upload-text{line-height:1.4;}
</style>
</head>
